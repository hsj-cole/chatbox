<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Asistente 1º Infantil C — HSJ</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#f0f7ff;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem;}
.container{width:100%;max-width:500px;}
.header{border-radius:20px 20px 0 0;overflow:hidden;position:relative;}
.header img{width:100%;height:120px;object-fit:cover;object-position:center 30%;display:block;}
.header-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(255,255,255,0.7));padding:10px 16px;display:flex;align-items:flex-end;justify-content:space-between;}
.header-title{color:#1a2f4a;font-weight:700;font-size:15px;margin:0;font-family:'Nunito',sans-serif;}
.header-sub{color:#1a2f4a;font-size:12px;margin:0;font-family:'Nunito',sans-serif;}
.lang-btn{font-size:11px;font-family:'Nunito',sans-serif;border:1.5px solid #1a6fb5;border-radius:20px;padding:3px 10px;background:rgba(255,255,255,0.7);cursor:pointer;color:#1a6fb5;font-weight:600;}
.lang-btn.active{background:#1a6fb5;color:#fff;}
.chat-body{background:#fff;border-left:1px solid #d6e8f9;border-right:1px solid #d6e8f9;padding:14px;min-height:340px;max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;align-items:flex-end;}
.msg.user{flex-direction:row-reverse;}
.mavatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.msg.bot .mavatar{background:#deeefb;}
.msg.user .mavatar{background:#d4f0e2;}
.bubble{padding:9px 13px;font-size:13px;line-height:1.55;max-width:82%;font-family:'Nunito',sans-serif;}
.msg.bot .bubble{background:#f0f7ff;border:1px solid #d6e8f9;border-radius:4px 14px 14px 14px;color:#1a2f4a;}
.msg.user .bubble{background:#1a6fb5;color:#fff;border-radius:14px 4px 14px 14px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;background:#fff;border-left:1px solid #d6e8f9;border-right:1px solid #d6e8f9;}
.chip{font-size:12px;font-family:'Nunito',sans-serif;font-weight:600;border:1.5px solid #b8d9f5;border-radius:20px;padding:5px 12px;background:#f0f7ff;cursor:pointer;color:#1a6fb5;}
.chip:hover{background:#1a6fb5;color:#fff;border-color:#1a6fb5;}
.input-area{display:flex;gap:8px;padding:12px 14px;background:#fff;border:1px solid #d6e8f9;border-radius:0 0 20px 20px;}
.input-area input{flex:1;font-size:13px;font-family:'Nunito',sans-serif;border:1.5px solid #d6e8f9;border-radius:20px;padding:8px 14px;outline:none;color:#1a2f4a;background:#f8fbff;}
.input-area input:focus{border-color:#1a6fb5;}
.send-btn{width:38px;height:38px;border-radius:50%;background:#1a6fb5;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.send-btn:hover{background:#155d9e;}
.typing{display:flex;gap:5px;align-items:center;padding:2px 0;}
.dot{width:7px;height:7px;border-radius:50%;background:#b8d9f5;animation:blink 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
.admin-panel{margin-top:12px;background:#fff;border:1px solid #d6e8f9;border-radius:16px;padding:16px;}
.admin-panel input[type=password]{width:100%;font-size:13px;font-family:'Nunito',sans-serif;border:1.5px solid #d6e8f9;border-radius:10px;padding:8px 12px;outline:none;color:#1a2f4a;margin-bottom:8px;}
.admin-btn{font-size:13px;font-family:'Nunito',sans-serif;font-weight:700;background:#1a6fb5;color:#fff;border:none;border-radius:10px;padding:8px 18px;cursor:pointer;}
.admin-btn.danger{background:#c0392b;margin-left:8px;}
.admin-panel textarea{width:100%;font-size:13px;font-family:'Nunito',sans-serif;border:1.5px solid #d6e8f9;border-radius:10px;padding:10px 12px;min-height:150px;resize:vertical;outline:none;color:#1a2f4a;line-height:1.5;margin-bottom:8px;}
.err-msg{font-size:12px;color:#c0392b;margin-bottom:8px;display:none;}
.ok-msg{font-size:12px;color:#27ae60;margin-top:6px;display:none;}
</style>
</head>

}

function send() {
  var inp = document.getElementById('inp');
  var text = inp.value.trim();
  if (!text) return;
  inp.value = '';

  if (text.toLowerCase() === SECRET) {
    var panel = document.getElementById('admin-panel');
    panel.style.display = 'block';
    panel.scrollIntoView({ behavior: 'smooth' });
    document.getElementById('current-info').textContent = extraInfo || '(Sin informacion adicional)';
    document.getElementById('admin-info').value = extraInfo;
    return;
  }

  document.getElementById('chips').innerHTML = '';
  addMsg(text, 'user');
  chatHistory.push({ role: 'user', parts: [{ text: text }] });
  showTyping();

  var systemFull = SYSTEM + (extraInfo ? ('\n\nINFORMACION ADICIONAL DEL PROFE:\n' + extraInfo) : '');

  var body = JSON.stringify({
    system_instruction: { parts: [{ text: systemFull }] },
    contents: chatHistory,
    generationConfig: { maxOutputTokens: 500, temperature: 0.3 }
  });

  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('x-goog-api-key', GEMINI_KEY);
  xhr.onload = function() {
    removeTyping();
    try {
      var data = JSON.parse(xhr.responseText);
      var reply = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] ? data.candidates[0].content.parts[0].text : '';
      if (!reply) reply = lang === 'es' ? 'Lo siento, no pude procesar tu consulta. Escribe al profe Alex: a.martinez@colegiohijasdesanjose.com' : 'Sorry, I could not process your query. Email Teacher Alex: a.martinez@colegiohijasdesanjose.com';
      chatHistory.push({ role: 'model', parts: [{ text: reply }] });
      addMsg(reply, 'bot');
    } catch(e) {
      addMsg(lang === 'es' ? 'Ha ocurrido un error.' : 'An error occurred.', 'bot');
    }
  };
  xhr.onerror = function() {
    removeTyping();
    addMsg(lang === 'es' ? 'Ha ocurrido un error de conexion.' : 'A connection error occurred.', 'bot');
  };
  xhr.send(body);
}

function checkPass() {
  if (document.getElementById('admin-pass').value === ADMIN_PASS) {
    document.getElementById('admin-login').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    document.getElementById('current-info').textContent = extraInfo || '(Sin informacion adicional)';
    document.getElementById('admin-info').value = extraInfo;
  } else {
    document.getElementById('pass-err').style.display = 'block';
  }
}

function saveInfo() {
  extraInfo = document.getElementById('admin-info').value.trim();
  try { localStorage.setItem('hsj_extra', extraInfo); } catch(e) {}
  document.getElementById('current-info').textContent = extraInfo || '(Vacio)';
  var msg = document.getElementById('ok-msg');
  msg.style.display = 'block';
  setTimeout(function() { msg.style.display = 'none'; }, 3000);
}

function clearInfo() {
  if (!confirm('Borrar toda la informacion adicional?')) return;
  extraInfo = '';
  try { localStorage.removeItem('hsj_extra'); } catch(e) {}
  document.getElementById('current-info').textContent = '(Sin informacion adicional)';
  document.getElementById('admin-info').value = '';
}

renderChips();
