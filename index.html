<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbox HSJ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --border: #e4e1db;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --accent: #2c5f8a;
      --accent-light: #eaf1f8;
      --user-bg: #2c5f8a;
      --user-text: #ffffff;
      --bot-bg: #ffffff;
      --bot-border: #e4e1db;
      --danger: #c0392b;
      --success: #27ae60;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0 20px;
    }

    .header-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header-title span {
      color: var(--accent);
    }

    .admin-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-size: 0.8rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .admin-btn:hover { border-color: var(--accent); color: var(--accent); }
    .admin-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Chat container ── */
    .chat-wrap {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      height: calc(100vh - 120px);
      min-height: 400px;
      overflow: hidden;
      transition: height 0.25s ease;
    }

    body.admin-open .chat-wrap {
      height: 45vh;
      min-height: 300px;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 3px;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--bot-border);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    .msg-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 4px;
    }

    /* ── Typing indicator ── */
    .typing .bubble {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 14px;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--border);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Input bar ── */
    .input-bar {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #userInput {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border 0.15s;
      max-height: 120px;
      min-height: 42px;
      line-height: 1.4;
      background: var(--bg);
      color: var(--text);
    }
    #userInput:focus { border-color: var(--accent); }

    #sendBtn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #sendBtn:hover { opacity: 0.85; }
    #sendBtn svg { width: 18px; height: 18px; }

    /* ── Admin panel ── */
    #adminPanel {
      display: none;
      width: 100%;
      max-width: 720px;
      margin-top: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .admin-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
      transition: all 0.15s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border 0.15s;
      background: var(--bg);
      color: var(--text);
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .btn {
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      border: none;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-danger  { background: var(--danger); color: white; }
    .btn-ghost   { background: none; border: 1px solid var(--border); color: var(--text); }

    /* ── Entries list ── */
    #entriesList { display: flex; flex-direction: column; gap: 8px; }

    .entry-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .entry-info { flex: 1; min-width: 0; }
    .entry-topic {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .entry-preview {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .entry-actions button {
      border: 1px solid var(--border);
      background: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .entry-actions .edit-btn:hover { border-color: var(--accent); color: var(--accent); }
    .entry-actions .del-btn:hover  { border-color: var(--danger); color: var(--danger); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    .modal h3 { font-size: 1rem; margin-bottom: 16px; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    /* ── Password screen ── */
    #pwScreen {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #pwScreen.open { display: flex; }

    .pw-box {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .pw-box h3 { font-size: 1rem; margin-bottom: 6px; }
    .pw-box p  { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px; }
    .pw-error  { font-size: 0.8rem; color: var(--danger); margin-top: 6px; min-height: 16px; }

    /* ── Status tag ── */
    .status-tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 99px;
      margin-left: 8px;
      font-weight: 500;
    }
    .status-ok   { background: #e6f9ef; color: var(--success); }
    .status-err  { background: #fdecea; color: var(--danger); }
    .status-info { background: var(--accent-light); color: var(--accent); }

    /* ── Saving indicator ── */
    #saveStatus {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      padding: 6px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ── Scrollbar ── */
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @media (max-width: 480px) {
      .msg { max-width: 92%; }
      .bubble { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<!-- Password screen -->
<div id="pwScreen">
  <div class="pw-box">
    <h3 id="pwTitle">Acceso profesor</h3>
    <p id="pwDesc">Introduce la contraseña de acceso</p>
    <div class="form-group">
      <input type="password" id="pwInput" placeholder="Contraseña" autocomplete="off" />
    </div>
    <div class="pw-error" id="pwError"></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-ghost" onclick="closePwScreen()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitPw()">Entrar</button>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Editar entrada</h3>
    <div class="form-group">
      <label>Tema</label>
      <input type="text" id="editTopic" />
    </div>
    <div class="form-group">
      <label>Información</label>
      <textarea id="editContent" rows="5"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEdit()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- Header -->
<header>
  <div class="header-title">Chat <span>HSJ</span></div>
  <div id="adminToggleWrap" style="display:none;"><button class="admin-btn active" id="adminToggle" onclick="toggleAdminPanel()">⚙ Profesor</button></div>
</header>

<!-- Chat -->
<div class="chat-wrap">
  <div id="messages"></div>
  <div class="input-bar">
    <textarea id="userInput" placeholder="Escribe tu pregunta..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<!-- Admin panel -->
<div id="adminPanel">
  <div class="admin-tabs">
    <button class="tab-btn active" onclick="switchTab('add')">➕ Añadir</button>
    <button class="tab-btn" onclick="switchTab('manage')">📋 Gestionar</button>
  </div>

  <!-- Add tab -->
  <div class="tab-content active" id="tab-add">
    <div class="form-group">
      <label>Tema / Título</label>
      <input type="text" id="newTopic" placeholder="Ej: Horario de tutorías" />
    </div>
    <div class="form-group">
      <label>Información</label>
      <textarea id="newContent" rows="4"
        placeholder="Escribe la información que los padres podrán consultar..."></textarea>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-primary" onclick="handleAddEntry()">Guardar información</button>
      <span id="addStatus"></span>
    </div>
  </div>

  <!-- Manage tab -->
  <div class="tab-content" id="tab-manage">
    <div id="entriesList"></div>
  </div>

  <div id="saveStatus"></div>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIG — cambia estas dos líneas con tus datos
// ─────────────────────────────────────────────
const GITHUB_USER  = "hsj-cole";
const GITHUB_REPO  = "chatbox";
const GITHUB_BRANCH = "main";
const DATA_FILE    = "data.json";
const API_BASE     = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FILE}`;

// ─── Contraseñas (hasheadas con SHA-256) ───
// PW1: motherfucker   PW2: hsj2526
const PW1_HASH = "2f5f6ce5ae30b54aa5d7ced1ba566982bab34ba2814a51ce1865d2c2d8815cd4";
const PW2_HASH = "f1561a16b0aaee7c6f806795c440778ace9f1cdadfe826df456c48da7159e981";

// ─── Runtime state ───
let knowledgeBase = [];
let fileSHA       = null;
let adminUnlocked = false;
let editUnlocked  = false;
let editingIndex  = -1;
let pendingAction = null; // 'admin' | 'edit'
let pendingConfirm = null; // track repeated questions
let isThinking    = false;
let GITHUB_TOKEN  = localStorage.getItem("hsj_gh_token") || null; // solo vive en el navegador del profesor

// ─── SHA-256 helper ───
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
}

// ─── GitHub API ───
async function fetchData() {
  try {
    // Public repo: read without any token
    const res = await fetch(API_BASE + "?t=" + Date.now(), {
      headers: { Accept: "application/vnd.github+json" }
    });
    if (!res.ok) { console.warn("Could not load data, status:", res.status); return; }
    const json = await res.json();
    fileSHA = json.sha;
    const decoded = decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
    const parsed  = JSON.parse(decoded);
    knowledgeBase = parsed.entries || [];
  } catch(e) { console.warn("Could not load data:", e); }
}

async function saveData() {
  if (!GITHUB_TOKEN) {
    setSaveStatus("⚠ Token no configurado — los datos no se guardarán en la nube.", "err");
    return false;
  }
  try {
    setSaveStatus("Guardando...", "info");
    const payload = { entries: knowledgeBase };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
    const body    = { message: "Update data", content, branch: GITHUB_BRANCH };
    if (fileSHA) body.sha = fileSHA;

    const res = await fetch(API_BASE, {
      method: "PUT",
      headers: {
        Authorization: `token ${GITHUB_TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json();
      if (res.status === 401) {
        GITHUB_TOKEN = null;
        localStorage.removeItem("hsj_gh_token");
        setSaveStatus("Token inválido o caducado. Vuelve a guardar para introducir uno nuevo.", "err");
      } else {
        setSaveStatus("Error al guardar: " + (err.message || res.status), "err");
      }
      return false;
    }
    const data = await res.json();
    fileSHA = data.content.sha;
    setSaveStatus("✓ Guardado en GitHub", "ok");
    return true;
  } catch(e) {
    setSaveStatus("Error de red al guardar.", "err");
    return false;
  }
}

function setSaveStatus(msg, type) {
  const el = document.getElementById("saveStatus");
  el.innerHTML = `<span class="status-tag status-${type}">${msg}</span>`;
  if (type === "ok") setTimeout(() => el.innerHTML = "", 3000);
}

// ─── Password system ───
let pwResolve = null;

function openPwScreen(title, desc) {
  return new Promise(resolve => {
    pwResolve = resolve;
    document.getElementById("pwTitle").textContent = title;
    document.getElementById("pwDesc").textContent  = desc;
    document.getElementById("pwInput").value = "";
    document.getElementById("pwError").textContent = "";
    document.getElementById("pwScreen").classList.add("open");
    setTimeout(() => document.getElementById("pwInput").focus(), 100);
  });
}

function closePwScreen() {
  document.getElementById("pwScreen").classList.remove("open");
  if (pwResolve) { pwResolve(null); pwResolve = null; }
}

async function submitPw() {
  const val  = document.getElementById("pwInput").value.trim();
  if (!val) return;
  const hash = await sha256(val);
  if (pwResolve) { pwResolve({ raw: val, hash }); pwResolve = null; }
  document.getElementById("pwScreen").classList.remove("open");
}

document.getElementById("pwInput").addEventListener("keydown", e => {
  if (e.key === "Enter") submitPw();
});

// ─── Admin flow ───

// ─── Add entry ───
async function handleAddEntry() {
  if (!editUnlocked) {
    const result = await openPwScreen(
      "Contraseña de edición",
      "Introduce la segunda contraseña para poder añadir, editar o borrar información."
    );
    if (!result) return;
    const hash = await sha256(result.raw);
    if (hash !== PW2_HASH) {
      document.getElementById("pwScreen").classList.add("open");
      document.getElementById("pwError").textContent = "Contraseña incorrecta.";
      setTimeout(closePwScreen, 1500);
      return;
    }
    editUnlocked = true;
  }
  addEntry();
}

async function addEntry() {
  const topic   = document.getElementById("newTopic").value.trim();
  const content = document.getElementById("newContent").value.trim();
  if (!topic || !content) {
    document.getElementById("addStatus").innerHTML =
      '<span class="status-tag status-err">Rellena el tema y la información.</span>';
    return;
  }

  if (!GITHUB_TOKEN) {
    const t = await openPwScreen(
      "Token de GitHub necesario",
      "Introduce tu token de GitHub (ghp_...). Se guardará solo en este navegador, nunca en GitHub."
    );
    if (!t || !t.raw) return;
    GITHUB_TOKEN = t.raw;
    localStorage.setItem("hsj_gh_token", GITHUB_TOKEN);
  }

  knowledgeBase.push({ topic, content, date: new Date().toISOString() });
  const ok = await saveData();
  if (ok) {
    document.getElementById("newTopic").value   = "";
    document.getElementById("newContent").value = "";
    document.getElementById("addStatus").innerHTML =
      '<span class="status-tag status-ok">✓ Guardado</span>';
    setTimeout(() => document.getElementById("addStatus").innerHTML = "", 3000);
    renderEntries();
  } else {
    knowledgeBase.pop();
  }
}

// ─── Manage entries ───
function renderEntries() {
  const list = document.getElementById("entriesList");
  if (knowledgeBase.length === 0) {
    list.innerHTML = '<div class="empty-state">No hay información guardada todavía.</div>';
    return;
  }
  list.innerHTML = knowledgeBase.map((e, i) => `
    <div class="entry-card">
      <div class="entry-info">
        <div class="entry-topic">${escHtml(e.topic)}</div>
        <div class="entry-preview">${escHtml(e.content.substring(0,80))}${e.content.length>80?"…":""}</div>
      </div>
      <div class="entry-actions">
        <button class="edit-btn" onclick="openEdit(${i})">Editar</button>
        <button class="del-btn"  onclick="deleteEntry(${i})">Borrar</button>
      </div>
    </div>
  `).join("");
}

async function requireEditPw() {
  if (editUnlocked) return true;
  const result = await openPwScreen(
    "Contraseña de edición",
    "Introduce la segunda contraseña para editar o borrar información."
  );
  if (!result) return false;
  const hash = await sha256(result.raw);
  if (hash === PW2_HASH) { editUnlocked = true; return true; }
  document.getElementById("pwScreen").classList.add("open");
  document.getElementById("pwError").textContent = "Contraseña incorrecta.";
  setTimeout(closePwScreen, 1500);
  return false;
}

async function openEdit(i) {
  if (!await requireEditPw()) return;
  editingIndex = i;
  const e = knowledgeBase[i];
  document.getElementById("editTopic").value   = e.topic;
  document.getElementById("editContent").value = e.content;
  document.getElementById("editModal").classList.add("open");
}

function closeEdit() {
  document.getElementById("editModal").classList.remove("open");
  editingIndex = -1;
}

async function saveEdit() {
  if (editingIndex < 0) return;
  const topic   = document.getElementById("editTopic").value.trim();
  const content = document.getElementById("editContent").value.trim();
  if (!topic || !content) return;
  const backup = { ...knowledgeBase[editingIndex] };
  knowledgeBase[editingIndex] = { topic, content, date: new Date().toISOString() };
  const ok = await saveData();
  if (ok) { closeEdit(); renderEntries(); }
  else    { knowledgeBase[editingIndex] = backup; }
}

async function deleteEntry(i) {
  if (!await requireEditPw()) return;
  if (!confirm(`¿Borrar la entrada "${knowledgeBase[i].topic}"?`)) return;
  const backup = knowledgeBase.splice(i, 1);
  const ok = await saveData();
  if (!ok) { knowledgeBase.splice(i, 0, backup[0]); }
  else     { renderEntries(); }
}

// ─── Tab switch ───
function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add("active");
  document.getElementById(`tab-${tab}`).classList.add("active");
  if (tab === "manage") renderEntries();
}

// ─── Chat ───
function addMessage(text, role) {
  const msgs = document.getElementById("messages");
  const div  = document.createElement("div");
  div.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  div.innerHTML = `<div class="bubble">${escHtml(text).replace(/\n/g,"<br>")}</div>
                   <div class="msg-time">${time}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById("messages");
  const div  = document.createElement("div");
  div.className = "msg bot typing";
  div.id = "typingIndicator";
  div.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typingIndicator");
  if (t) t.remove();
}

async function sendMessage() {
  if (isThinking) return;
  const input = document.getElementById("userInput");
  const text  = input.value.trim();
  if (!text) return;

  // ── Secret admin trigger ──
  const hash = await sha256(text.trim());
  if (hash === PW1_HASH) {
    input.value = "";
    autoResize(input);
    adminUnlocked = true;
    document.getElementById("adminToggleWrap").style.display = "block";
    openAdminPanel();
    return; // don't show the password in chat
  }

  input.value = "";
  autoResize(input);
  addMessage(text, "user");
  isThinking = true;
  showTyping();

  await new Promise(r => setTimeout(r, 600 + Math.random() * 600));
  removeTyping();

  const reply = await generateReply(text);
  addMessage(reply, "bot");
  isThinking = false;
}

function openAdminPanel() {
  const panel = document.getElementById("adminPanel");
  panel.style.display = "block";
  document.getElementById("adminToggle").classList.add("active");
  document.body.classList.add("admin-open");
  renderEntries();
  setTimeout(() => panel.scrollIntoView({ behavior: "smooth", block: "start" }), 300);
}

function closeAdminPanel() {
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("adminToggle").classList.remove("active");
  document.body.classList.remove("admin-open");
}

function toggleAdminPanel() {
  const panel = document.getElementById("adminPanel");
  if (panel.style.display === "block") closeAdminPanel();
  else openAdminPanel();
}

async function generateReply(question) {
  const q = question.toLowerCase();

  // Check if this is a repeat of the last unanswered question
  if (pendingConfirm && similarity(q, pendingConfirm) > 0.7) {
    pendingConfirm = null;
    const lang = detectLang(question);
    return lang === "es"
      ? "Entendido. Para preguntas que no están en mi información, puedes enviar un correo electrónico al maestro/a de tu hijo/a."
      : "Understood. For questions not covered in my information, please send an email to your child's teacher.";
  }

  // Search knowledge base
  const matches = searchKB(question);

  if (matches.length > 0) {
    pendingConfirm = null;
    const lang = detectLang(question);
    const top  = matches.slice(0,3);
    if (lang === "es") {
      return top.map(e => `📌 **${e.topic}**\n${e.content}`).join("\n\n");
    } else {
      return top.map(e => `📌 **${e.topic}**\n${e.content}`).join("\n\n");
    }
  }

  // Call Claude API for a smarter match
  if (knowledgeBase.length > 0) {
    try {
      const context = knowledgeBase.map(e => `[${e.topic}]: ${e.content}`).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `Eres un asistente de clase de colegio. Responde SOLO usando la información proporcionada en el contexto. Si la pregunta no tiene respuesta en el contexto, responde exactamente con la palabra: NO_FOUND. Detecta el idioma de la pregunta y responde en ese mismo idioma. No inventes información.

CONTEXTO DISPONIBLE:
${context}`,
          messages: [{ role: "user", content: question }]
        })
      });
      if (res.ok) {
        const data  = await res.json();
        const reply = data.content.map(b => b.text || "").join("").trim();
        if (reply !== "NO_FOUND" && reply.length > 0) {
          pendingConfirm = null;
          return reply;
        }
      }
    } catch(e) { /* fallback below */ }
  }

  // Not found — ask for confirmation
  pendingConfirm = q;
  const lang = detectLang(question);
  return lang === "es"
    ? "No tengo información sobre eso. ¿Estás seguro/a de lo que preguntas? Si vuelves a preguntar lo mismo, te indicaré cómo contactar con el maestro/a."
    : "I don't have information about that. Are you sure about your question? If you ask again, I'll let you know how to contact the teacher.";
}

// ─── Search helpers ───
function searchKB(query) {
  const q = query.toLowerCase();
  const words = q.split(/\s+/).filter(w => w.length > 2);
  return knowledgeBase.filter(e => {
    const combined = (e.topic + " " + e.content).toLowerCase();
    return words.some(w => combined.includes(w));
  });
}

function similarity(a, b) {
  const wa = new Set(a.split(/\s+/));
  const wb = new Set(b.split(/\s+/));
  const inter = [...wa].filter(w => wb.has(w)).length;
  return inter / Math.max(wa.size, wb.size);
}

function detectLang(text) {
  const esWords = /\b(el|la|los|las|un|una|que|de|en|y|es|son|para|con|como|tiene|hay|qué|cuándo|dónde|cómo|quién)\b/i;
  return esWords.test(text) ? "es" : "en";
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── UI helpers ───
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = "42px";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

// ─── Init ───
(async function init() {
  await fetchData();
  const lang = navigator.language.startsWith("es") ? "es" : "en";
  const welcome = lang === "es"
    ? "¡Hola! Soy el asistente de la clase. Puedes preguntarme sobre cualquier tema relacionado con el colegio. ¿En qué te puedo ayudar?"
    : "Hello! I'm the class assistant. You can ask me about any school-related topic. How can I help you?";
  addMessage(welcome, "bot");
})();
</script>
